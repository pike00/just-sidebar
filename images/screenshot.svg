<svg xmlns="http://www.w3.org/2000/svg" width="360" height="520" viewBox="0 0 360 520">
  <defs>
    <style>
      text { font-family: -apple-system, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <!-- VS Code sidebar background -->
  <rect width="360" height="520" fill="#252526"/>

  <!-- Section header -->
  <rect x="0" y="0" width="360" height="28" fill="#252526"/>
  <text x="14" y="18" font-size="11" font-weight="600" fill="#bbbcbd" letter-spacing="0.8">JUST RECIPES</text>

  <!-- Toolbar icons -->
  <!-- refresh icon -->
  <text x="296" y="18" font-size="14" fill="#bbbcbd">↻</text>
  <!-- go-to-file icon -->
  <text x="318" y="18" font-size="13" fill="#bbbcbd">⎘</text>

  <!-- Separator -->
  <line x1="0" y1="28" x2="360" y2="28" stroke="#3c3c3c" stroke-width="1"/>

  <!-- ── Ledger/justfile (collapsed) ── -->
  <rect x="0" y="29" width="360" height="22" fill="#252526"/>
  <!-- collapse arrow -->
  <text x="8" y="44" font-size="10" fill="#c5c5c5">▶</text>
  <!-- file icon -->
  <rect x="24" y="34" width="11" height="13" rx="1" fill="none" stroke="#75beff" stroke-width="1"/>
  <line x1="27" y1="34" x2="35" y2="34" stroke="#75beff" stroke-width="1"/>
  <text x="40" y="45" font-size="12" fill="#cccccc">Ledger/justfile</text>

  <!-- ── Ledger/queries/justfile (expanded) ── -->
  <rect x="0" y="51" width="360" height="22" fill="#2a2d2e"/>
  <text x="8" y="66" font-size="10" fill="#c5c5c5">▼</text>
  <rect x="24" y="56" width="11" height="13" rx="1" fill="none" stroke="#75beff" stroke-width="1"/>
  <line x1="27" y1="56" x2="35" y2="56" stroke="#75beff" stroke-width="1"/>
  <text x="40" y="67" font-size="12" fill="#cccccc">Ledger/queries/justfile</text>

  <!-- ── ungrouped: default ── -->
  <rect x="0" y="73" width="360" height="20" fill="#252526"/>
  <!-- play icon -->
  <text x="32" y="87" font-size="11" fill="#75beff">▶</text>
  <text x="50" y="87" font-size="12" fill="#cccccc">default</text>
  <!-- inline play button -->
  <text x="316" y="87" font-size="11" fill="#75beff" opacity="0">▶</text>

  <!-- ── group: [meta] ── -->
  <rect x="0" y="93" width="360" height="20" fill="#252526"/>
  <text x="20" y="107" font-size="10" fill="#c5c5c5">▼</text>
  <!-- namespace icon -->
  <text x="34" y="107" font-size="11" fill="#c586c0">⬡</text>
  <text x="50" y="107" font-size="12" fill="#cccccc">meta</text>
  <text x="130" y="107" font-size="11" fill="#858585">2 recipes</text>

  <rect x="0" y="113" width="360" height="20" fill="#252526"/>
  <text x="50" y="127" font-size="11" fill="#75beff">▶</text>
  <text x="64" y="127" font-size="12" fill="#cccccc">tui</text>

  <rect x="0" y="133" width="360" height="20" fill="#252526"/>
  <text x="50" y="147" font-size="11" fill="#75beff">▶</text>
  <text x="64" y="147" font-size="12" fill="#cccccc">accounts</text>

  <!-- ── group: [balances] ── -->
  <rect x="0" y="153" width="360" height="20" fill="#252526"/>
  <text x="20" y="167" font-size="10" fill="#c5c5c5">▼</text>
  <text x="34" y="167" font-size="11" fill="#c586c0">⬡</text>
  <text x="50" y="167" font-size="12" fill="#cccccc">balances</text>
  <text x="140" y="167" font-size="11" fill="#858585">7 recipes</text>

  <rect x="0" y="173" width="360" height="20" fill="#252526"/>
  <text x="50" y="187" font-size="11" fill="#75beff">▶</text>
  <text x="64" y="187" font-size="12" fill="#cccccc">net-worth</text>

  <rect x="0" y="193" width="360" height="20" fill="#252526"/>
  <text x="50" y="207" font-size="11" fill="#75beff">▶</text>
  <text x="64" y="207" font-size="12" fill="#cccccc">assets-all</text>

  <rect x="0" y="213" width="360" height="20" fill="#252526"/>
  <text x="50" y="227" font-size="11" fill="#75beff">▶</text>
  <text x="64" y="227" font-size="12" fill="#cccccc">liabilities-all</text>

  <rect x="0" y="233" width="360" height="20" fill="#252526"/>
  <text x="50" y="247" font-size="11" fill="#75beff">▶</text>
  <text x="64" y="247" font-size="12" fill="#cccccc">checking-balances</text>

  <rect x="0" y="253" width="360" height="20" fill="#252526"/>
  <text x="50" y="267" font-size="11" fill="#75beff">▶</text>
  <text x="64" y="267" font-size="12" fill="#cccccc">savings-balances</text>

  <rect x="0" y="273" width="360" height="20" fill="#252526"/>
  <text x="50" y="287" font-size="11" fill="#75beff">▶</text>
  <text x="64" y="287" font-size="12" fill="#cccccc">cc-balances</text>

  <rect x="0" y="293" width="360" height="20" fill="#252526"/>
  <text x="50" y="307" font-size="11" fill="#75beff">▶</text>
  <text x="64" y="307" font-size="12" fill="#cccccc">investment-balances</text>

  <!-- ── group: [income] ── -->
  <rect x="0" y="313" width="360" height="20" fill="#252526"/>
  <text x="20" y="327" font-size="10" fill="#c5c5c5">▼</text>
  <text x="34" y="327" font-size="11" fill="#c586c0">⬡</text>
  <text x="50" y="327" font-size="12" fill="#cccccc">income</text>
  <text x="120" y="327" font-size="11" fill="#858585">3 recipes</text>

  <rect x="0" y="333" width="360" height="20" fill="#252526"/>
  <text x="50" y="347" font-size="11" fill="#75beff">▶</text>
  <text x="64" y="347" font-size="12" fill="#cccccc">income-all</text>

  <rect x="0" y="353" width="360" height="20" fill="#252526"/>
  <text x="50" y="367" font-size="11" fill="#75beff">▶</text>
  <text x="64" y="367" font-size="12" fill="#cccccc">income-monthly</text>

  <rect x="0" y="373" width="360" height="20" fill="#252526"/>
  <text x="50" y="387" font-size="11" fill="#75beff">▶</text>
  <text x="64" y="387" font-size="12" fill="#cccccc">income-ytd</text>

  <!-- ── group: [expenses] ── -->
  <rect x="0" y="393" width="360" height="20" fill="#252526"/>
  <text x="20" y="407" font-size="10" fill="#c5c5c5">▶</text>
  <text x="34" y="407" font-size="11" fill="#c586c0">⬡</text>
  <text x="50" y="407" font-size="12" fill="#cccccc">expenses</text>
  <text x="130" y="407" font-size="11" fill="#858585">4 recipes</text>

  <!-- ── group: [budget] (collapsed) ── -->
  <rect x="0" y="413" width="360" height="20" fill="#252526"/>
  <text x="20" y="427" font-size="10" fill="#c5c5c5">▶</text>
  <text x="34" y="427" font-size="11" fill="#c586c0">⬡</text>
  <text x="50" y="427" font-size="12" fill="#cccccc">budget</text>
  <text x="120" y="427" font-size="11" fill="#858585">2 recipes</text>

  <!-- tooltip overlay on accounts-closed -->
  <rect x="60" y="440" width="260" height="22" rx="3" fill="#252526" stroke="#454545" stroke-width="1"/>
  <text x="70" y="455" font-size="11" fill="#cccccc">List accounts that have been closed</text>

  <!-- bottom gradient fade -->
  <rect x="0" y="460" width="360" height="60" fill="url(#fade)"/>
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252526" stop-opacity="0"/>
      <stop offset="100%" stop-color="#252526" stop-opacity="1"/>
    </linearGradient>
  </defs>
</svg>
